<style>
  :root{
    --bg:#09090b;
    --card:rgba(255,255,255,.045);
    --card-hover:rgba(255,255,255,.075);
    --border:rgba(255,255,255,.09);
    --text:#f4f4f5;
    --muted:#9d9da8;
    --accent:#5eead4;
    --accent2:#818cf8;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
    min-height:100dvh;
    background-image:
      radial-gradient(600px 300px at 50% -50px, rgba(94,234,212,.09), transparent 70%),
      radial-gradient(500px 260px at 85% 10%, rgba(129,140,248,.07), transparent 70%);
    background-repeat:no-repeat;
  }
  .wrap{
    max-width:460px;
    margin:0 auto;
    padding:clamp(28px,6vw,52px) 20px 40px;
    text-align:center;
  }
  /* ---- Etkinlik rozeti (URL'de ?e= varsa görünür) ---- */
  .event{
    display:none;
    margin:0 auto 26px;
    padding:12px 22px;
    border-radius:16px;
    background:linear-gradient(var(--bg),var(--bg)) padding-box,
               linear-gradient(120deg,var(--accent),var(--accent2)) border-box;
    border:1px solid transparent;
    animation:pop .5s ease both;
  }
  .event.show{display:inline-block}
  .event b{
    display:block;
    font-size:1.02rem;
    font-weight:700;
    letter-spacing:-.01em;
    background:linear-gradient(120deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
  }
  .event span{display:block;font-size:.78rem;color:var(--muted);margin-top:3px}
  /* ---- Profil ---- */
  .avatar{
    width:106px;height:106px;border-radius:50%;
    object-fit:cover;display:block;margin:0 auto 18px;
    border:2px solid rgba(255,255,255,.14);
    box-shadow:0 0 0 6px rgba(255,255,255,.03),0 18px 50px -12px rgba(94,234,212,.25);
  }
  .avatar-fallback{
    width:106px;height:106px;border-radius:50%;
    margin:0 auto 18px;
    display:none;align-items:center;justify-content:center;
    font-size:2.1rem;font-weight:700;color:#09090b;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:2px solid rgba(255,255,255,.14);
    box-shadow:0 0 0 6px rgba(255,255,255,.03),0 18px 50px -12px rgba(94,234,212,.25);
  }
  h1{font-size:1.5rem;font-weight:700;letter-spacing:-.02em}
  .bio{color:var(--muted);font-size:.94rem;margin-top:7px;line-height:1.5}
  /* ---- Linkler ---- */
  .links{margin-top:30px;display:flex;flex-direction:column;gap:12px;text-align:left}
  .link{
    display:flex;align-items:center;gap:14px;
    padding:15px 16px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    text-decoration:none;color:var(--text);
    transition:transform .18s ease,border-color .18s ease,background .18s ease;
  }
  .link:hover,.link:focus-visible{
    transform:translateY(-2px);
    border-color:rgba(94,234,212,.55);
    background:var(--card-hover);
  }
  .link:active{transform:translateY(0)}
  .ic{
    flex:0 0 42px;height:42px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,rgba(94,234,212,.14),rgba(129,140,248,.14));
    border:1px solid rgba(255,255,255,.07);
  }
  .ic svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .lt{flex:1;min-width:0}
  .lt b{display:block;font-size:.97rem;font-weight:600;letter-spacing:-.01em}
  .lt span{display:block;font-size:.78rem;color:var(--muted);margin-top:2px}
  .arrow{flex:0 0 auto;color:var(--muted);transition:transform .18s ease,color .18s ease}
  .link:hover .arrow{transform:translateX(3px);color:var(--accent)}
  /* ---- Sosyal ---- */
  .socials{margin-top:30px;display:flex;justify-content:center;gap:14px}
  .socials a{
    width:46px;height:46px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:var(--card);border:1px solid var(--border);
    transition:transform .18s ease,border-color .18s ease;
  }
  .socials a:hover,.socials a:focus-visible{transform:translateY(-2px);border-color:rgba(94,234,212,.55)}
  .socials svg{width:19px;height:19px;fill:#d4d4d8;transition:fill .18s ease}
  .socials a:hover svg{fill:var(--accent)}
  footer{margin-top:38px;color:#5b5b66;font-size:.75rem}
  footer a{color:inherit;text-decoration:none}
  /* ---- Animasyon ---- */
  @keyframes pop{from{opacity:0;transform:translateY(-8px) scale(.97)}to{opacity:1;transform:none}}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .r1,.r2,.r3{animation:rise .55s ease both}
  .r2{animation-delay:.08s}.r3{animation-delay:.16s}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  a:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:16px}
</style>

<script>
  // ===== ETKİNLİK İSİMLERİ: kısa-ad → sayfada görünen ad =====
  // Yeni satır eklemek yeterli: 'kisa-ad': 'Görünen Ad',
  var EVENTS = {
    'tofas-ai-day': 'TOFAŞ AI Day'
  };
  // ============================================================

  function trSlug(s) {
    return s.toLowerCase()
      .replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s')
      .replace(/ı/g,'i').replace(/i̇/g,'i').replace(/ö/g,'o').replace(/ç/g,'c')
      .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
  }
  function prettify(slug) {
    var ACR = ['ai','yz','ar','vr','ux','ui','hr','it','iot','api'];
    return slug.split('-').map(function (w) {
      return ACR.indexOf(w) > -1 ? w.toUpperCase() : w.charAt(0).toUpperCase() + w.slice(1);
    }).join(' ');
  }

  // Etkinlik: ?e=tofas-ai-day  (eski format ?e=Tofaş%20AI%20Day da çalışır)
  var params = new URLSearchParams(location.search);
  var ev = (params.get('e') || params.get('etkinlik') || '');
  // Çift kodlanmış URL'leri toparla (%2520 → %20 → boşluk)
  try {
    var guard = 0;
    while (/%[0-9a-fA-F]{2}/.test(ev) && guard++ < 5) {
      var dec = decodeURIComponent(ev);
      if (dec === ev) break;
      ev = dec;
    }
  } catch (err) {}
  ev = ev.trim().slice(0, 80);
  if (ev) {
    var key = trSlug(ev);
    if (EVENTS[key]) {
      ev = EVENTS[key];
    } else if (/^[a-z0-9]+(-[a-z0-9]+)*$/.test(ev)) {
      ev = prettify(ev);
    }
  }
  if (ev) {
    document.getElementById('eventName').textContent = ev;
    document.getElementById('event').classList.add('show');
    document.title = ev + ' · Erman Taylan';
  }
  // Profil fotoğrafı yoksa baş harfler gösterilir
  var av = document.getElementById('avatar');
  av.addEventListener('error', function () {
    av.style.display = 'none';
    document.getElementById('avatarFallback').style.display = 'flex';
  });
  document.getElementById('year').textContent = new Date().getFullYear();
</script>
